<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-label="Genesis architecture diagram">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1a1a2e; stroke-width: 3; rx: 8; }
      .txt { font: 700 26px 'Segoe UI', Trebuchet MS, sans-serif; fill: #1a1a2e; }
      .line { stroke: #1a1a2e; stroke-width: 4; fill: none; }
      .small { font: 700 22px 'Segoe UI', Trebuchet MS, sans-serif; fill: #1a1a2e; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- Top row -->
  <rect class="box" x="40" y="70" width="220" height="80"/>
  <text class="txt" x="150" y="118" text-anchor="middle">ROM + Input</text>

  <rect class="box" x="320" y="70" width="210" height="80"/>
  <text class="txt" x="425" y="118" text-anchor="middle">68000 CPU</text>

  <rect class="box" x="590" y="70" width="140" height="80"/>
  <text class="txt" x="660" y="118" text-anchor="middle">VDP</text>

  <rect class="box" x="790" y="70" width="150" height="80"/>
  <text class="txt" x="865" y="118" text-anchor="middle">VRAM</text>

  <rect class="box" x="1000" y="70" width="180" height="80"/>
  <text class="txt" x="1090" y="118" text-anchor="middle">Display</text>

  <!-- Top arrows -->
  <path class="line" marker-end="url(#arrow)" d="M260 110 H318"/>
  <path class="line" marker-end="url(#arrow)" d="M530 110 H588"/>
  <path class="line" marker-end="url(#arrow)" d="M730 110 H788"/>
  <path class="line" marker-end="url(#arrow)" d="M940 110 H998"/>

  <!-- Down branch from 68000 -->
  <path class="line" marker-end="url(#arrow)" d="M425 150 V228"/>

  <!-- Bottom row -->
  <rect class="box" x="300" y="250" width="250" height="100"/>
  <text class="txt" x="425" y="308" text-anchor="middle">Z80 Sound CPU</text>

  <rect class="box" x="650" y="250" width="190" height="44"/>
  <text class="small" x="745" y="279" text-anchor="middle">YM2612 FM</text>

  <rect class="box" x="650" y="306" width="190" height="44"/>
  <text class="small" x="745" y="335" text-anchor="middle">SN76489</text>

  <text class="txt" x="1030" y="306" text-anchor="middle">Audio</text>

  <!-- Audio arrows -->
  <path class="line" marker-end="url(#arrow)" d="M550 272 H648"/>
  <path class="line" marker-end="url(#arrow)" d="M550 328 H648"/>
  <path class="line" marker-end="url(#arrow)" d="M840 272 H975"/>
  <path class="line" marker-end="url(#arrow)" d="M840 328 H975"/>
</svg>
